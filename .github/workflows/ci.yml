name: ci

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Format
        run: cargo fmt -- --check
      - name: Clippy
        run: cargo clippy -- -D warnings
      - name: Test
        run: cargo test
      - name: Build (release)
        run: cargo build --release
      - name: Release size
        shell: pwsh
        run: |
          $item = Get-Item "target/release/rivet.exe"
          $bytes = $item.Length
          $mb = [math]::Round($bytes / 1MB, 2)
          "Release exe size: $bytes bytes ($mb MB)"
          "Release exe size: $bytes bytes ($mb MB)" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append -Encoding utf8
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: rivet-windows-x64
          path: target/release/rivet.exe
