name: release

on:
  push:
    tags:
      - "v*"

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y
      - name: Test
        run: cargo test
      - name: Build portable
        run: pwsh -ExecutionPolicy Bypass -File scripts\package.ps1
      - name: Build installer
        env:
          INNO_SETUP_ISCC: C:\Program Files (x86)\Inno Setup 6\ISCC.exe
        run: pwsh -ExecutionPolicy Bypass -File scripts\build-installer.ps1
      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/*.zip
            dist/*.exe
            dist/checksums.txt
