name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v0.1.1)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  windows:
    runs-on: windows-latest
    permissions:
      contents: write
      pull-requests: read
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y
      - name: Test
        run: cargo test
      - name: Build portable
        run: pwsh -ExecutionPolicy Bypass -File scripts\package.ps1
      - name: Build installer
        env:
          INNO_SETUP_ISCC: C:\Program Files (x86)\Inno Setup 6\ISCC.exe
        run: pwsh -ExecutionPolicy Bypass -File scripts\build-installer.ps1
      - name: Prepare release notes
        shell: pwsh
        run: |
          $tag = if ("${{ github.event_name }}" -eq "workflow_dispatch") { "${{ inputs.tag }}" } else { "${{ github.ref_name }}" }
          $version = $tag.TrimStart("v")
          $lines = Get-Content CHANGELOG.md
          $start = ($lines | Select-String -SimpleMatch "## [$version]" -List).LineNumber
          if (-not $start) { throw "Release section [$version] not found in CHANGELOG.md." }
          $next = ($lines | Select-String -SimpleMatch "## [" | Where-Object { $_.LineNumber -gt $start } | Select-Object -First 1).LineNumber
          if ($next) {
            $section = $lines[($start - 1)..($next - 2)]
          } else {
            $section = $lines[($start - 1)..($lines.Length - 1)]
          }
          New-Item -ItemType Directory -Path dist -Force | Out-Null
          $section | Set-Content -Path dist\\release-notes.md -Encoding utf8
      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
          generate_release_notes: false
          body_path: dist/release-notes.md
          files: |
            dist/*.zip
            dist/*.exe
            dist/checksums.txt
